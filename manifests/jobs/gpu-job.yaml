apiVersion: batch/v1
kind: Job
metadata:
  generateName: obtainability-demo-gpu-
  namespace: demo-jobs
  labels:
    kueue.x-k8s.io/queue-name: demo-queue
spec:
  parallelism: 1
  completions: 1
  template:
    spec:
      nodeSelector:
        cloud.google.com/compute-class: gpu-ondemand-fallback
      containers:
      - name: gpu-job
        image: nvidia/cuda:12.0.0-base-ubuntu22.04
        command:
        - /bin/sh
        - -c
        - "echo 'Running GPU job...' && nvidia-smi && sleep 60"
        resources:
          requests:
            cpu: "2"
            memory: "8Gi"
            nvidia.com/gpu: "1"
          limits:
            nvidia.com/gpu: "1"
      restartPolicy: Never
