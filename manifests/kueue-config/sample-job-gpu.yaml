apiVersion: batch/v1
kind: Job
metadata:
  generateName: obtainability-demo-gpu-
  namespace: demo-jobs
  labels:
    kueue.x-k8s.io/queue-name: demo-queue
spec:
  parallelism: 2
  completions: 2
  template:
    spec:
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-rtx-pro-6000
      containers:
      - name: gpu-job
        image: nvidia/cuda:12.0.0-base-ubuntu22.04
        command: ["/bin/sh", "-c", "apt-get update && apt-get install -y curl && echo 'Running GPU job in zone:' && curl -s http://metadata.google.internal/computeMetadata/v1/instance/zone -H 'Metadata-Flavor: Google' && echo && nvidia-smi && sleep 30"]
        resources:
          limits:
            nvidia.com/gpu: "1"
          requests:
            cpu: "2"
            memory: "8Gi"
            nvidia.com/gpu: "1"
      restartPolicy: Never
